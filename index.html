<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <div class="header">
            <h1>MAKE YOUR QR CODE</h1>
            <p>By Abdi</p>
        </div>

        <div class="qr-box">
            <h2>Convert Any Text Or URL To QR Code</h2>
            <input type="text" id="qr-input" placeholder="Text Here please!!">
            <button id="gen-btn">Generate The QR Code</button>
            <div id="qr-result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
